name: Deploy Demo UI

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NODE_VERSION: '22'

permissions:
  id-token: write

jobs:
  deploy-demo:
    name: Deploy Demo UI to AWS
    environment: Production
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: demo
        run: npm ci

      - name: Build
        working-directory: demo
        run: |
          echo "VITE_API_BASE=${{ vars.API_BASE_URL }}" > demo/.env
          echo "VITE_WS_BASE=$(echo '${{ vars.API_BASE_URL }}' | sed 's/http/ws/; s/https/wss/')" >> demo/.env
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Upload to S3
        run: |
          aws s3 sync demo/dist s3://${{ secrets.DEMO_S3_BUCKET }} \
            --delete \
            --cache-control "max-age=300"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.DEMO_CF_DISTRIBUTION_ID }} \
            --paths "/*"